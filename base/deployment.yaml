apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-app
  template:
    metadata:
      labels:
        app: k8s-app
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      initContainers:
        - name: fetch-secrets
          image: alpine/git
          command:
            - sh
            - -c
            - git clone https://github.com/mbidoyen/k8s-secrets.git /secrets-repo && cp /secrets-repo/secrets.env /secrets/secrets.env
          volumeMounts:
            - name: secrets-volume
              mountPath: /secrets
      containers:
        - name: k8s-app
          image: dockerazariel/k8s-app:v1
          command:
            - sh
            - -c
            - export $(cat /secrets/secrets.env) && node app.js
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
            - name: secrets-volume
              mountPath: /secrets
      volumes:
        - name: config-volume
          configMap:
            name: app-config
        - name: secrets-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-app-service
spec:
  type: LoadBalancer
  selector:
    app: k8s-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
